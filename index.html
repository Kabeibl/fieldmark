<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#b5572f" />
<title>Forest Walk &amp; Talk</title>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<style>
  :root{
    --paper:#f4ece0; --paper-2:#ece1d0; --ink:#2b2622; --ink-soft:#5c5147;
    --rust:#b5572f; --rust-deep:#8f4222; --moss:#5f6b3a; --moss-deep:#47521f;
    --line:#d8cab3; --shadow:rgba(43,38,34,.18);
    --kb:0px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;background:var(--paper);color:var(--ink);
    font-family:"Spline Sans Mono",ui-monospace,monospace;overscroll-behavior:none;}
  #map{position:fixed;inset:0;background:var(--paper-2);}
  .leaflet-container{font-family:"Spline Sans Mono",monospace;background:#dfd2ba;}

  /* ---- top bar ---- */
  .topbar{position:fixed;top:0;left:0;right:0;z-index:600;display:flex;align-items:center;gap:10px;
    padding:calc(env(safe-area-inset-top) + 10px) 14px 10px;
    background:linear-gradient(180deg,rgba(244,236,224,.96),rgba(244,236,224,.0));
    pointer-events:none;}
  .brand{pointer-events:auto;display:flex;align-items:baseline;gap:8px;}
  .brand h1{font-family:"Fraunces",serif;font-weight:600;font-size:18px;letter-spacing:.2px;margin:0;color:var(--ink);}
  .brand .tag{font-size:11px;color:var(--ink-soft);letter-spacing:.5px;text-transform:uppercase;}
  .count{margin-left:auto;pointer-events:auto;font-size:12px;color:var(--ink-soft);
    background:var(--paper);border:1px solid var(--line);border-radius:20px;padding:4px 10px;cursor:pointer;}
  .count:active{transform:scale(.95);}
  .lang-btn{pointer-events:auto;font-size:11px;font-weight:600;letter-spacing:.6px;
    border:1px solid var(--line);border-radius:20px;padding:4px 10px;
    background:var(--paper);color:var(--ink-soft);cursor:pointer;font-family:inherit;}
  .lang-btn:active{transform:scale(.95);}

  /* ---- floating buttons ---- */
  .fab{position:fixed;right:16px;z-index:600;width:52px;height:52px;border-radius:50%;
    border:1px solid var(--line);background:var(--paper);color:var(--ink);
    box-shadow:0 4px 14px var(--shadow);display:flex;align-items:center;justify-content:center;
    cursor:pointer;font-size:22px;}
  .fab:active{transform:scale(.94);}
  #recenter{bottom:calc(env(safe-area-inset-bottom) + 92px);}
  #listBtn{bottom:calc(env(safe-area-inset-bottom) + 24px);}
  #mapToggle{bottom:calc(env(safe-area-inset-bottom) + 160px);flex-direction:column;gap:2px;}
  #mapToggle svg{width:20px;height:20px;}
  #mapToggle .map-label{font-size:8px;font-weight:600;letter-spacing:.6px;line-height:1;}
  #standsToggle{bottom:calc(env(safe-area-inset-bottom) + 228px);flex-direction:column;gap:2px;}
  #standsToggle svg{width:20px;height:20px;}
  #standsToggle .map-label{font-size:8px;font-weight:600;letter-spacing:.6px;line-height:1;}
  #standsToggle.active{background:var(--moss);color:#fff;border-color:var(--moss-deep);}
  .fab-badge{position:absolute;top:-5px;right:-5px;min-width:16px;height:16px;border-radius:8px;
    background:var(--rust);color:#fff;font-size:9px;font-weight:700;line-height:1;
    display:flex;align-items:center;justify-content:center;padding:0 3px;
    border:2px solid var(--paper);}

  /* ---- stand sheet ---- */
  .stand-row{display:flex;align-items:center;flex-wrap:wrap;gap:8px;padding:9px 0;border-bottom:1px solid var(--line);}
  .stand-lbl{font-size:12px;color:var(--ink-soft);width:108px;flex-shrink:0;}
  .stand-input{flex:1;min-width:0;border:1px solid var(--line);border-radius:8px;padding:5px 8px;
    font-family:inherit;font-size:13px;background:var(--paper-2);color:var(--ink);}
  .stand-input:focus{outline:none;border-color:var(--moss);}
  .stand-unit{font-size:11px;color:var(--ink-soft);white-space:nowrap;min-width:36px;text-align:right;}
  .stand-orig{display:none;width:100%;padding-left:116px;font-size:11px;color:var(--ink-soft);font-style:italic;}
  .stand-row.modified .stand-input{border-color:var(--moss);}
  .stand-row.modified .stand-orig{display:block;}
  .stand-note{margin-top:14px;}
  .fab svg{width:24px;height:24px;}
  #recenter.locating svg{animation:spin 1s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .hint{position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 28px);transform:translateX(-50%);
    z-index:590;background:var(--ink);color:var(--paper);font-size:12px;padding:8px 14px;border-radius:20px;
    box-shadow:0 4px 14px var(--shadow);opacity:.92;max-width:78vw;text-align:center;}

  /* ---- stand highlight ring ---- */
  .stand-ring{width:24px;height:24px;border-radius:50%;border:3px solid var(--moss);
    animation:stand-ring 1.3s ease-out 0s 3 forwards;}
  @keyframes stand-ring{0%{transform:scale(1);opacity:1;}100%{transform:scale(7);opacity:0;}}

  /* ---- stand number label on map ---- */
  .stand-label{background:transparent !important;border:none !important;box-shadow:none !important;
    transform:translate(-50%,-50%);color:var(--moss-deep);font-size:10px;font-weight:700;
    font-family:"Spline Sans Mono",monospace;padding:0;white-space:nowrap;
    text-shadow:0 0 3px var(--paper),0 0 3px var(--paper),0 0 6px var(--paper);}

  /* ---- you-are-here dot ---- */
  .me-dot{width:18px;height:18px;border-radius:50%;background:#2f7fd1;border:3px solid #fff;
    box-shadow:0 0 0 2px rgba(47,127,209,.5);}
  .me-pulse{position:relative;}
  .me-pulse::after{content:"";position:absolute;left:50%;top:50%;width:18px;height:18px;border-radius:50%;
    transform:translate(-50%,-50%);background:rgba(47,127,209,.35);animation:pulse 2s ease-out infinite;}
  @keyframes pulse{0%{width:18px;height:18px;opacity:.7;}100%{width:70px;height:70px;opacity:0;}}

  /* ---- teardrop pin ---- */
  .pin{position:relative;width:30px;height:40px;filter:drop-shadow(0 3px 4px var(--shadow));}
  .pin svg{width:30px;height:40px;display:block;}
  .pin .dots{position:absolute;left:0;right:0;top:9px;display:flex;gap:3px;justify-content:center;}
  .pin .dot{width:6px;height:6px;border-radius:50%;border:1px solid rgba(255,255,255,.7);}
  .dot.ink{background:var(--ink);} .dot.moss{background:var(--moss);} .dot.rust{background:var(--rust);}

  /* ---- sheet / modal ---- */
  .scrim{position:fixed;inset:0;bottom:var(--kb);z-index:900;background:rgba(43,38,34,.42);
    display:none;align-items:flex-end;justify-content:center;transition:bottom .15s ease;}
  .scrim.open{display:flex;}
  .sheet{width:100%;max-width:560px;background:var(--paper);border-radius:20px 20px 0 0;
    border-top:1px solid var(--line);box-shadow:0 -8px 30px var(--shadow);
    padding:18px 18px calc(env(safe-area-inset-bottom) + 18px);max-height:88%;overflow:auto;
    animation:rise .22s ease;}
  @keyframes rise{from{transform:translateY(30px);opacity:.4;}to{transform:none;opacity:1;}}
  .sheet h2{font-family:"Fraunces",serif;font-weight:600;font-size:20px;margin:2px 0 2px;}
  .sheet .sub{font-size:11px;color:var(--ink-soft);margin-bottom:14px;letter-spacing:.4px;}
  .grip{width:40px;height:4px;border-radius:4px;background:var(--line);margin:0 auto 12px;}

  textarea{width:100%;min-height:84px;resize:vertical;font-family:inherit;font-size:15px;color:var(--ink);
    background:var(--paper-2);border:1px solid var(--line);border-radius:12px;padding:12px;line-height:1.45;}
  textarea:focus{outline:none;border-color:var(--rust);}

  .row{display:flex;gap:10px;margin-top:12px;}
  .chip{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 6px;
    border:1px solid var(--line);border-radius:12px;background:var(--paper-2);cursor:pointer;font-size:12px;color:var(--ink-soft);}
  .chip svg{width:22px;height:22px;}
  .chip.has{border-color:var(--moss);color:var(--moss-deep);background:#eef0e2;}
  .chip:active{transform:scale(.97);}

  .previews{margin-top:12px;display:flex;flex-wrap:wrap;gap:8px;}
  .previews img{width:72px;height:72px;object-fit:cover;border-radius:10px;border:1px solid var(--line);}
  .thumbwrap{position:relative;}
  .thumbwrap .x{position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;
    background:var(--rust);color:#fff;border:none;font-size:12px;line-height:1;cursor:pointer;}
  .audiochip{display:flex;align-items:center;gap:8px;background:#eef0e2;border:1px solid var(--moss);
    border-radius:10px;padding:8px 10px;font-size:12px;color:var(--moss-deep);}

  .actions{display:flex;gap:10px;margin-top:18px;}
  .btn{flex:1;border:none;border-radius:12px;padding:14px;font-family:inherit;font-size:14px;font-weight:600;
    cursor:pointer;letter-spacing:.3px;}
  .btn:active{transform:scale(.98);}
  .btn.primary{background:var(--rust);color:#fff;}
  .btn.ghost{background:var(--paper-2);color:var(--ink);border:1px solid var(--line);}
  .btn.danger{background:var(--paper-2);color:var(--rust-deep);border:1px solid var(--rust);}
  .btn[disabled]{opacity:.5;}

  /* view mark */
  .vnote{font-size:15px;line-height:1.5;white-space:pre-wrap;margin:6px 0 0;}
  .vmeta{font-size:11px;color:var(--ink-soft);margin-top:10px;letter-spacing:.3px;}
  .vimgs{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;}
  .vimgs img{width:100%;max-width:160px;border-radius:10px;border:1px solid var(--line);}
  audio{width:100%;margin-top:12px;}

  /* recording overlay */
  .recbar{display:flex;align-items:center;gap:10px;margin-top:12px;background:#f6e7df;border:1px solid var(--rust);
    border-radius:12px;padding:12px;}
  .recdot{width:12px;height:12px;border-radius:50%;background:var(--rust);animation:blink 1s steps(2) infinite;}
  @keyframes blink{50%{opacity:.2;}}
  .rectime{font-variant-numeric:tabular-nums;font-weight:600;}

  /* list view */
  .list-section{font-size:11px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;
    color:var(--ink-soft);padding:16px 4px 6px;border-top:2px solid var(--line);margin-top:6px;}
  .list-section:first-child{border-top:none;padding-top:0;}
  .listitem{display:flex;gap:12px;align-items:center;padding:12px 4px;border-bottom:1px solid var(--line);cursor:pointer;}
  .listitem:active{background:var(--paper-2);}
  .li-icons{display:flex;gap:4px;}
  .li-icons .d{width:8px;height:8px;border-radius:50%;}
  .li-txt{flex:1;min-width:0;}
  .li-title{font-size:14px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .li-sub{font-size:11px;color:var(--ink-soft);margin-top:2px;}
  .empty{text-align:center;color:var(--ink-soft);font-size:13px;padding:30px 10px;}

  /* toast */
  .toast{position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 90px);transform:translateX(-50%);
    z-index:1000;background:var(--ink);color:var(--paper);font-size:13px;padding:11px 16px;border-radius:12px;
    box-shadow:0 6px 18px var(--shadow);max-width:80vw;text-align:center;opacity:0;transition:opacity .2s;pointer-events:none;}
  .toast.show{opacity:.96;}
  .toast.warn{background:var(--rust-deep);}
</style>
</head>
<body>
<div id="map"></div>

<div class="topbar">
  <div class="brand"><h1>Forest Walk &amp; Talk</h1></div>
  <button id="langBtn" class="lang-btn">FI</button>
  <div class="count" id="count">0 merkintää</div>
</div>

<button class="fab" id="recenter" title="Keskitä sijaintiin" aria-label="Keskitä sijaintiin">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
</button>
<button class="fab" id="standsToggle" title="Piilota kuviorajat" aria-label="Piilota kuviorajat">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 12 3 21 6 21 18 12 21 3 18 3 6"/><line x1="12" y1="3" x2="12" y2="21"/><line x1="3" y1="12" x2="21" y2="12"/></svg>
  <span class="map-label">KUV</span>
  <span class="fab-badge" id="standsBadge" style="display:none"></span>
</button>
<button class="fab" id="mapToggle" title="Vaihda: satelliitti" aria-label="Vaihda: satelliitti">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
  <span class="map-label" id="mapLabel">TOPO</span>
</button>
<button class="fab" id="listBtn" title="Kaikki merkinnät" aria-label="Kaikki merkinnät">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3.5" cy="6" r="1.2"/><circle cx="3.5" cy="12" r="1.2"/><circle cx="3.5" cy="18" r="1.2"/></svg>
</button>

<div class="hint" id="hint">Napauta karttaa lisätäksesi merkinnän</div>
<div class="toast" id="toast"></div>

<!-- ===== Add / Edit sheet ===== -->
<div class="scrim" id="addScrim">
  <div class="sheet" role="dialog" aria-modal="true">
    <div class="grip"></div>
    <h2 id="addTitle">Uusi merkintä</h2>
    <div class="sub" id="addSub"></div>
    <textarea id="noteText" placeholder="Kirjoita muistiinpano… (valinnainen)"></textarea>

    <div class="row">
      <label class="chip" id="photoChip">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="12" cy="12" r="3"/></svg>
        <span data-i18n="photo">Valokuva</span>
        <input type="file" id="photoInput" accept="image/*" multiple capture="environment" hidden />
      </label>
      <button class="chip" id="audioChip" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0M12 17v4"/></svg>
        <span id="audioLabel">Äänitä</span>
      </button>
    </div>

    <div class="recbar" id="recBar" style="display:none;">
      <span class="recdot"></span><span data-i18n="recording">Äänitetään…</span>
      <span class="rectime" id="recTime">0:00</span>
      <button class="btn primary" id="stopRec" style="flex:0 0 auto;padding:8px 14px;margin:0;" data-i18n="stop">Lopeta</button>
    </div>

    <div class="previews" id="previews"></div>

    <div class="actions">
      <button class="btn ghost" id="cancelAdd" data-i18n="cancel">Peruuta</button>
      <button class="btn primary" id="saveAdd">Tallenna merkintä</button>
    </div>
  </div>
</div>

<!-- ===== View sheet ===== -->
<div class="scrim" id="viewScrim">
  <div class="sheet" role="dialog" aria-modal="true">
    <div class="grip"></div>
    <h2 id="viewTitle">Merkintä</h2>
    <div class="sub" id="viewSub"></div>
    <div id="viewBody"></div>
    <div class="actions">
      <button class="btn ghost" id="closeView" data-i18n="close">Sulje</button>
      <button class="btn primary" id="editMark" data-i18n="edit">Muokkaa</button>
      <button class="btn danger" id="deleteMark" data-i18n="delete">Poista</button>
    </div>
  </div>
</div>

<!-- ===== List sheet ===== -->
<div class="scrim" id="listScrim">
  <div class="sheet" role="dialog" aria-modal="true">
    <div class="grip"></div>
    <h2 data-i18n="all_marks">Kaikki merkinnät</h2>
    <div class="sub" id="listSub"></div>
    <div id="listBody"></div>
    <div class="actions"><button class="btn ghost" id="closeList" data-i18n="close">Sulje</button></div>
  </div>
</div>

<!-- ===== Stand sheet ===== -->
<div class="scrim" id="standScrim">
  <div class="sheet" role="dialog" aria-modal="true">
    <div class="grip"></div>
    <h2 data-i18n="stand">Kuvio</h2>
    <div class="sub" id="standSub"></div>
    <div id="standFields"></div>
    <div class="stand-note">
      <textarea id="standNote" placeholder="Muistiinpanot…"></textarea>
    </div>
    <div class="actions">
      <button class="btn ghost" id="closeStand" data-i18n="close">Sulje</button>
      <button class="btn danger" id="revertStand" data-i18n="revert" style="display:none">Palauta</button>
      <button class="btn primary" id="saveStand" data-i18n="save">Tallenna</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>

/* ============ Localisation ============ */

/* ============ Map ============ */
function ringCentroid(ring){
  let area=0,cx=0,cy=0;
  for(let i=0,j=ring.length-1;i<ring.length;j=i++){
    const [xi,yi]=ring[i],[xj,yj]=ring[j];
    const k=xi*yj-xj*yi; area+=k; cx+=(xi+xj)*k; cy+=(yi+yj)*k;
  }
  area/=2; return [cx/(6*area), cy/(6*area)];
}
function pointInRing(x,y,ring){
  let inside=false;
  for(let i=0,j=ring.length-1;i<ring.length;j=i++){
    const [xi,yi]=ring[i],[xj,yj]=ring[j];
    if((yi>y)!==(yj>y)&&x<(xj-xi)*(y-yi)/(yj-yi)+xi) inside=!inside;
  }
  return inside;
}
function standLabelPoint(ring){
  const [cx,cy]=ringCentroid(ring);
  if(pointInRing(cx,cy,ring)) return [cy,cx]; // [lat,lng]
  // centroid is outside (concave polygon) — grid-sample for nearest interior point
  const xs=ring.map(c=>c[0]),ys=ring.map(c=>c[1]);
  const x0=Math.min(...xs),x1=Math.max(...xs),y0=Math.min(...ys),y1=Math.max(...ys);
  const N=8; let best=null,bestD=Infinity;
  for(let i=0;i<=N;i++) for(let j=0;j<=N;j++){
    const x=x0+(x1-x0)*i/N, y=y0+(y1-y0)*j/N;
    if(pointInRing(x,y,ring)){ const d=(x-cx)**2+(y-cy)**2; if(d<bestD){best=[y,x];bestD=d;} }
  }
  return best||[cy,cx];
}

function initMap(){
  map = L.map("map",{zoomControl:false,attributionControl:true}).setView([20,0],2);
  L.control.zoom({position:"bottomleft"}).addTo(map);
  setMapType("topo");

  map.on("click", e => openAdd(e.latlng.lat, e.latlng.lng));
  map.on("dragstart", () => { following = false; });
  map.on("moveend zoomend", scheduleStandLoad);

  // Long-press / right-click → stand lookup
  map.on("contextmenu", e => { clearTimeout(lpTimer); lpTimer = null; openStandAt(e.latlng); });
  const con = map.getContainer();
  con.addEventListener("touchstart", e => {
    if(e.touches.length !== 1) return;
    const touch = e.touches[0];
    lpTimer = setTimeout(() => {
      lpTimer = null;
      const r = con.getBoundingClientRect();
      openStandAt(map.containerPointToLatLng(L.point(touch.clientX - r.left, touch.clientY - r.top)));
    }, 600);
  }, {passive:true});
  con.addEventListener("touchend",  () => { clearTimeout(lpTimer); lpTimer = null; }, {passive:true});
  con.addEventListener("touchmove", () => { clearTimeout(lpTimer); lpTimer = null; }, {passive:true});

  standLabels = L.layerGroup().addTo(map);
  standsLayer = L.geoJSON(null, {
    style:{ color:"#5f6b3a", weight:1.5, fillOpacity:.08, fillColor:"#5f6b3a" },
    onEachFeature(feature){
      const num = feature.properties && feature.properties.STANDNUMBER;
      if(num == null) return;
      const geom = feature.geometry;
      const ring = geom.type === "Polygon" ? geom.coordinates[0]
                 : geom.type === "MultiPolygon" ? geom.coordinates[0][0] : null;
      if(!ring) return;
      standLabels.addLayer(L.marker(standLabelPoint(ring), {
        icon: L.divIcon({ className:"stand-label", html:String(num), iconSize:[0,0], iconAnchor:[0,0] }),
        interactive: false
      }));
    }
  }).addTo(map);

  locate(true);
}

let standLoadTimer = null;
function scheduleStandLoad(){
  clearTimeout(standLoadTimer);
  standLoadTimer = setTimeout(loadStands, 500);
}

async function loadStands(){
  if(!standsVisible){ standsLayer.clearLayers(); standLabels.clearLayers(); return; }
  if(!PROXY_URL){ return; }
  if(map.getZoom() < 14){ standsLayer.clearLayers(); standLabels.clearLayers(); return; }
  const b = map.getBounds();
  const bbox = `${b.getWest()},${b.getSouth()},${b.getEast()},${b.getNorth()},EPSG:4326`;
  const url = `${PROXY_URL}?service=WFS&version=2.0.0&request=GetFeature` +
    `&typeNames=v1:stand&bbox=${bbox}&outputFormat=application/json&srsName=CRS:84&count=300`;
  try{
    const res = await fetch(url);
    const data = await res.json();
    standsLayer.clearLayers(); standLabels.clearLayers();
    standsLayer.addData(data);
  }catch(e){ console.warn("Stands load failed", e); }
}

async function openStandAt(latlng){
  if(!PROXY_URL){ toast(tr("toast_proxy"), true); return; }
  const filter = encodeURIComponent(`INTERSECTS(GEOMETRY,SRID=4326;POINT(${latlng.lng} ${latlng.lat}))`);
  const url = `${PROXY_URL}?service=WFS&version=2.0.0&request=GetFeature` +
    `&typeNames=v1:stand&CQL_FILTER=${filter}&outputFormat=application/json&srsName=CRS:84&count=1`;
  try{
    toast(tr("toast_looking"));
    const res = await fetch(url);
    const data = await res.json();
    if(data.features && data.features.length){ showStandSheet(data.features[0]); }
    else { toast(tr("toast_no_stand")); }
  }catch(e){ toast(tr("toast_stand_err"), true); console.warn(e); }
}

function geomCentroid(geom){
  if(!geom) return null;
  const ring = geom.type === "Polygon" ? geom.coordinates[0]
             : geom.type === "MultiPolygon" ? geom.coordinates[0][0] : null;
  if(!ring || !ring.length) return null;
  const n = ring.length;
  return { lat: ring.reduce((s,c)=>s+c[1],0)/n, lng: ring.reduce((s,c)=>s+c[0],0)/n };
}

function showStandSheet(feature){
  const p = feature.properties || {};
  const id = feature.id || JSON.stringify(p).slice(0,60);
  currentStandId = id;
  currentStandLL = geomCentroid(feature.geometry) || (standEdits[id] && standEdits[id]._ll) || null;
  const saved = standEdits[id] || {};

  $("standSub").textContent = id;
  $("revertStand").style.display = standEdits[id] ? "" : "none";
  resetConfirm($("revertStand"), "revert");
  const box = $("standFields");
  box.innerHTML = "";
  LANGS[lang].stand_fields.forEach(f => {
    const apiVal = p[f.key] ?? "–";
    const apiStr = String(apiVal);
    const isEdited = saved[f.key] !== undefined && saved[f.key] !== apiStr;
    const localVal = saved[f.key] !== undefined ? saved[f.key] : apiStr;
    const row = document.createElement("div");
    row.className = "stand-row" + (isEdited ? " modified" : "");
    const lbl = document.createElement("span"); lbl.className = "stand-lbl"; lbl.textContent = f.label;
    const inp = document.createElement("input"); inp.className = "stand-input";
    inp.dataset.field = f.key; inp.dataset.orig = apiStr;
    inp.type = "text"; inp.value = localVal;
    const unit = document.createElement("span"); unit.className = "stand-unit"; unit.textContent = f.unit;
    const orig = document.createElement("span"); orig.className = "stand-orig";
    orig.textContent = tr("original", `${apiStr}${f.unit ? " " + f.unit : ""}`);
    row.append(lbl, inp, unit, orig);
    box.appendChild(row);
  });
  $("standNote").value = saved._note || "";

  box.querySelectorAll(".stand-input").forEach(inp => {
    inp.addEventListener("input", () => {
      const changed = inp.value.trim() !== inp.dataset.orig;
      inp.closest(".stand-row").classList.toggle("modified", changed);
    });
  });

  $("standScrim").classList.add("open");
}

/* ============ Geolocation ============ */
function locate(initial){
  if(!navigator.geolocation){ toast(tr("toast_loc_no"), true); return; }
  $("recenter").classList.add("locating");
  navigator.geolocation.getCurrentPosition(pos=>{
    $("recenter").classList.remove("locating");
    placeMe(pos.coords.latitude, pos.coords.longitude, pos.coords.accuracy);
    if(initial || following){ map.setView([pos.coords.latitude,pos.coords.longitude], 16); }
    if(initial) startWatch();
    hasLocated = true;
  }, err=>{
    $("recenter").classList.remove("locating");
    toast(initial ? tr("toast_loc_https") : tr("toast_loc_err"), true);
  }, {enableHighAccuracy:true, timeout:10000, maximumAge:5000});
}
function startWatch(){
  navigator.geolocation.watchPosition(pos=>{
    placeMe(pos.coords.latitude,pos.coords.longitude,pos.coords.accuracy);
    if(following) map.panTo([pos.coords.latitude,pos.coords.longitude],{animate:true});
  }, ()=>{}, {enableHighAccuracy:true, maximumAge:3000, timeout:15000});
}
function placeMe(lat,lng,acc){
  const ll=[lat,lng];
  if(!meMarker){
    meMarker = L.marker(ll,{icon:L.divIcon({className:"me-pulse",html:'<div class="me-dot"></div>',iconSize:[18,18],iconAnchor:[9,9]}),interactive:false,zIndexOffset:1000}).addTo(map);
    meAccuracy = L.circle(ll,{radius:acc||30,color:"#2f7fd1",weight:1,fillColor:"#2f7fd1",fillOpacity:.08}).addTo(map);
  } else {
    meMarker.setLatLng(ll); meAccuracy.setLatLng(ll).setRadius(acc||30);
  }
}
$("mapToggle").onclick = () => setMapType(TILE_CONFIGS[currentMapType].next);

$("recenter").onclick = () => {
  following = true;
  if(meMarker){ map.flyTo(meMarker.getLatLng(), Math.max(map.getZoom(),16)); }
  locate(false);
};

function openEdit(id){

  pending = {lat:m.lat, lng:m.lng, photos:[...(m.photos||[])], audio:m.audio||null, editId:id};

  $("addSub").textContent = m.lat.toFixed(5)+", "+m.lng.toFixed(5);

    catch(err){ toast(tr("toast_photo_err"), true); }
  }
  $("photoInput").value = "";
  if(pending.photos.length) $("photoChip").classList.add("has");
  renderPreviews();
  budgetCheck();
});
function compressImage(file){
  return new Promise((res,rej)=>{
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = ()=>{
      URL.revokeObjectURL(url);
      const max=1000; let {width:w,height:h}=img;
      if(w>max||h>max){ const s=Math.min(max/w,max/h); w=Math.round(w*s); h=Math.round(h*s); }
      const c=document.createElement("canvas"); c.width=w; c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      res(c.toDataURL("image/jpeg",0.62));
    };
    img.onerror = rej; img.src = url;
  });
}
function renderPreviews(){
  const box=$("previews"); box.innerHTML="";
  pending.photos.forEach((src,i)=>{
    const w=document.createElement("div"); w.className="thumbwrap";
    w.innerHTML=`<img src="${src}"><button class="x" data-i="${i}">×</button>`;
    box.appendChild(w);
  });
  if(pending.audio){
    const a=document.createElement("div"); a.className="audiochip";
    a.innerHTML=`<span>${tr("voice_note_chip")}</span><button class="x" data-audio="1" style="position:static;width:18px;height:18px;">×</button>`;
    box.appendChild(a);
  }
}
$("previews").addEventListener("click", e=>{
  if(e.target.dataset.i!==undefined){ pending.photos.splice(+e.target.dataset.i,1);
    if(!pending.photos.length) $("photoChip").classList.remove("has"); renderPreviews(); }
  if(e.target.dataset.audio){ pending.audio=null; $("audioChip").classList.remove("has");
    $("audioLabel").textContent=tr("record"); renderPreviews(); }
});

/* audio */
let mediaRec=null, chunks=[], recTimer=null, recStart=0;
const MAX_AUDIO_MS = 120000; // 2 min
$("audioChip").onclick = ()=>{ if(mediaRec && mediaRec.state==="recording") stopRecording(); else startRecording(); };
$("stopRec").onclick = ()=> stopRecording();
async function startRecording(){
  if(!navigator.mediaDevices || !window.MediaRecorder){ toast(tr("toast_rec_no"), true); return; }
  try{
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    mediaRec = new MediaRecorder(stream); chunks=[];
    mediaRec.ondataavailable = e=>{ if(e.data.size) chunks.push(e.data); };
    mediaRec.onstop = ()=>{
      stream.getTracks().forEach(tk=>tk.stop());
      const blob = new Blob(chunks,{type: mediaRec.mimeType||"audio/webm"});
      const r = new FileReader();
      r.onload = ()=>{ pending.audio = r.result; $("audioChip").classList.add("has");
        $("audioLabel").textContent=tr("recorded"); renderPreviews(); budgetCheck(); };
      r.readAsDataURL(blob);
    };
    mediaRec.start(); recStart = Date.now();
    $("recBar").style.display="flex"; $("audioLabel").textContent=tr("recording");
    recTimer = setInterval(()=>{
      const ms = Date.now()-recStart;
      const s = Math.floor(ms/1000);
      $("recTime").textContent = Math.floor(s/60)+":"+String(s%60).padStart(2,"0");
      if(ms>=MAX_AUDIO_MS){ toast(tr("toast_2min")); stopRecording(); }
    },250);
  }catch(e){ toast(tr("toast_mic"), true); }
}
function stopRecording(silent){
  if(recTimer){ clearInterval(recTimer); recTimer=null; }
  $("recBar").style.display="none";
  if(mediaRec && mediaRec.state==="recording"){ mediaRec.stop(); }
  else if(silent && mediaRec){ try{ mediaRec.stream && mediaRec.stream.getTracks().forEach(tk=>tk.stop()); }catch(_){} }
}

/* save */
$("saveAdd").onclick = async ()=>{
  const text = $("noteText").value.trim();
  if(!text && !pending.photos.length && !pending.audio){ toast(tr("toast_need_cont")); return; }

  if(pending.editId){
    const m = marks.find(x=>x.id===pending.editId);
    if(!m){ closeAdd(); return; }
    const snap = {text:m.text, photos:m.photos, audio:m.audio, edited:m.edited};
    m.text = text; m.photos = pending.photos; m.audio = pending.audio; m.edited = Date.now();
    const size = await persist();
    if(size===false){ Object.assign(m, snap); return; }   // restore on storage failure
    refreshPin(m); closeAdd();
    toast(tr("toast_mark_upd"));
    return;
  }

  const m = {id:uid(), lat:pending.lat, lng:pending.lng, text, photos:pending.photos, audio:pending.audio, created:Date.now()};
  marks.push(m);
  const size = await persist();
  if(size===false){ marks.pop(); return; }
  addPin(m); updateCount(); closeAdd();
  toast(tr("toast_mark_ok"));
};

async function persist(){
  const size = Store.estimate(marks);
  if(size > BUDGET){ toast(tr("toast_full"), true); return false; }
  try{ await Store.save(marks); }
  catch(e){ toast(tr("toast_save_err"), true); return false; }
  if(size > WARN_AT) toast(tr("toast_almost", Math.round(size/1024/1024*10)/10), true);
  return size;
}
function budgetCheck(){
  const size = Store.estimate(marks) + (pending? Store.estimate([pending]) : 0);
  if(size > WARN_AT) toast(tr("toast_budget"), true);
}

/* ============ View mark ============ */
function openView(id){
  const m = marks.find(x=>x.id===id); if(!m) return;
  viewingId = id;
  $("viewTitle").textContent = m.text && m.text.trim() ? tr("title_note") : tr("title_mark");
  $("viewSub").textContent = fmtDate(m.created) + "  ·  " + m.lat.toFixed(5)+", "+m.lng.toFixed(5);
  let html = "";
  if(m.text && m.text.trim()) html += `<div class="vnote">${escapeHTML(m.text)}</div>`;
  if(m.audio) html += `<audio controls src="${m.audio}"></audio>`;
  if(m.photos && m.photos.length){ html += `<div class="vimgs">` + m.photos.map(p=>`<img src="${p}">`).join("") + `</div>`; }
  $("viewBody").innerHTML = html || `<div class="empty">${tr("empty_mark")}</div>`;
  resetConfirm($("deleteMark"), "delete");
  $("viewScrim").classList.add("open");
}
function escapeHTML(s){ return s.replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
$("editMark").onclick = ()=>{ const id = viewingId; $("viewScrim").classList.remove("open"); openEdit(id); };
$("closeView").onclick = ()=> $("viewScrim").classList.remove("open");
$("viewScrim").addEventListener("click", e=>{ if(e.target.id==="viewScrim") $("viewScrim").classList.remove("open"); });
$("deleteMark").onclick = async ()=> armConfirm($("deleteMark"), "confirm_delete", async () => {
  const i = marks.findIndex(x=>x.id===viewingId); if(i<0) return;
  marks.splice(i,1);
  if(layer.pins[viewingId]){ map.removeLayer(layer.pins[viewingId]); delete layer.pins[viewingId]; }
  await persist(); updateCount();
  $("viewScrim").classList.remove("open");
  toast(tr("toast_mark_del"));
});

/* ============ List view ============ */
function openStandFromList(id){
  const saved = standEdits[id]; if(!saved) return;
  const p = {};
  LANGS[lang].stand_fields.forEach(f => { p[f.key] = saved[f.key] !== undefined ? saved[f.key] : "–"; });
  const ll = saved._ll;

  if(ll){
    // Ensure stands overlay is on so the polygon is visible
    if(!standsVisible){
      standsVisible = true;
      $("standsToggle").classList.add("active");
      const label = tr("stands_hide");
      $("standsToggle").title = label; $("standsToggle").setAttribute("aria-label", label);
    }
    map.flyTo([ll.lat, ll.lng], Math.max(map.getZoom(), 15));

    // Pulse ring at centroid
    const ring = L.divIcon({ className:"", html:'<div class="stand-ring"></div>', iconSize:[24,24], iconAnchor:[12,12] });
    const ping = L.marker([ll.lat, ll.lng], { icon:ring, interactive:false }).addTo(map);
    setTimeout(() => map.removeLayer(ping), 4000);

    // Open sheet after fly settles
    setTimeout(() => showStandSheet({ id, properties: p }), 900);
  } else {
    showStandSheet({ id, properties: p });
  }
}

$("listBtn").onclick = ()=>{
  const body = $("listBody"); body.innerHTML="";
  $("listSub").textContent = tr("n_saved", marks.length);

  const standIds = Object.keys(standEdits);
  const hasMarks = marks.length > 0;
  const hasStands = standIds.length > 0;

  if(hasMarks || hasStands){
    if(hasMarks){
      if(hasStands){
        const hdr = document.createElement("div"); hdr.className = "list-section";
        hdr.textContent = tr("section_marks"); body.appendChild(hdr);
      }
      [...marks].sort((a,b)=>b.created-a.created).forEach(m=>{
        const dots = contentDots(m).map(c=>`<span class="d ${c}" style="background:${c==='ink'?'#2b2622':c==='moss'?'#5f6b3a':'#b5572f'}"></span>`).join("");
        const el=document.createElement("div"); el.className="listitem"; el.dataset.id=m.id;
        el.innerHTML = `<div class="li-icons">${dots||'<span class="d" style="background:#d8cab3"></span>'}</div>
          <div class="li-txt"><div class="li-title">${escapeHTML(summary(m))}</div>
          <div class="li-sub">${fmtDate(m.created)}</div></div>`;
        body.appendChild(el);
      });
    }

    if(hasStands){
      const hdr = document.createElement("div"); hdr.className = "list-section";
      hdr.textContent = tr("section_stands"); body.appendChild(hdr);
      standIds.forEach(id => {
        const saved = standEdits[id];
        const note = (saved._note || "").trim();
        const shortId = id.replace(/^stand\./, "");
        const title = note ? note.split("\n")[0] : shortId;
        const sub = note ? shortId : "";
        const el = document.createElement("div"); el.className="listitem"; el.dataset.standId=id;
        el.innerHTML = `<div class="li-icons"><span class="d" style="background:var(--moss)"></span></div>
          <div class="li-txt"><div class="li-title">${escapeHTML(title)}</div>
          ${sub ? `<div class="li-sub">${escapeHTML(sub)}</div>` : ""}</div>`;
        body.appendChild(el);
      });
    }
  } else {
    body.innerHTML = `<div class="empty">${tr("no_marks")}</div>`;
  }

  $("listScrim").classList.add("open");
};
$("listBody").addEventListener("click", e=>{
  const item = e.target.closest(".listitem"); if(!item) return;
  if(item.dataset.standId){
    $("listScrim").classList.remove("open");
    openStandFromList(item.dataset.standId);
    return;
  }
  const m = marks.find(x=>x.id===item.dataset.id); if(!m) return;
  $("listScrim").classList.remove("open");
  map.flyTo([m.lat,m.lng], Math.max(map.getZoom(),16));
  setTimeout(()=>openView(m.id), 350);
});
$("closeList").onclick = ()=> $("listScrim").classList.remove("open");
$("listScrim").addEventListener("click", e=>{ if(e.target.id==="listScrim") $("listScrim").classList.remove("open"); });

/* ============ Language toggle ============ */
$("langBtn").onclick = () => {
  lang = lang === "fi" ? "en" : "fi";
  localStorage.setItem("fwt.lang", lang);
  applyLang();
};

/* ============ Keyboard avoidance ============ */
if(window.visualViewport){
  const onVV = () => {
    const kb = Math.max(0, window.innerHeight - visualViewport.height - visualViewport.offsetTop);
    document.documentElement.style.setProperty("--kb", kb + "px");
  };
  visualViewport.addEventListener("resize", onVV);
  visualViewport.addEventListener("scroll", onVV);
}

/* ============ Boot ============ */
(async function(){
  initMap();
  marks = await Store.load();
  try{ const r = localStorage.getItem(STANDS_KEY); if(r) standEdits = JSON.parse(r); }catch(_){}
  renderAllPins();
  applyLang();
  updateStandsBadge();
  setTimeout(()=>{ $("hint").style.transition="opacity .6s"; $("hint").style.opacity="0"; }, 4000);
  if("serviceWorker" in navigator){
    window.addEventListener("load", ()=> navigator.serviceWorker.register("sw.js").catch(()=>{}));
  }
})();
</script>
